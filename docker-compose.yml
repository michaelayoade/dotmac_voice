services:
  migrate:
    build: .
    container_name: dotmac_voice_migrate
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_voice}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
      FUSIONPBX_API_URL: ${FUSIONPBX_API_URL:-http://localhost:8080}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY:-}
      ESL_HOST: ${ESL_HOST:-localhost}
      ESL_PORT: ${ESL_PORT:-8021}
      ESL_PASSWORD: ${ESL_PASSWORD:-ClueCon}
      EDGE_WSS_URL: ${EDGE_WSS_URL:-wss://sip.dotmac.io:443}
      VOICE_INGRESS_API_KEYS: ${VOICE_INGRESS_API_KEYS:-}
      VOICE_INGRESS_ALLOWED_IPS: ${VOICE_INGRESS_ALLOWED_IPS:-}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY:-dev-token-key}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  app:
    build: .
    container_name: dotmac_voice_app
    restart: unless-stopped
    ports:
      - "8007:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_voice}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
      FUSIONPBX_API_URL: ${FUSIONPBX_API_URL:-http://localhost:8080}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY:-}
      ESL_HOST: ${ESL_HOST:-localhost}
      ESL_PORT: ${ESL_PORT:-8021}
      ESL_PASSWORD: ${ESL_PASSWORD:-ClueCon}
      EDGE_WSS_URL: ${EDGE_WSS_URL:-wss://sip.dotmac.io:443}
      VOICE_INGRESS_API_KEYS: ${VOICE_INGRESS_API_KEYS:-}
      VOICE_INGRESS_ALLOWED_IPS: ${VOICE_INGRESS_ALLOWED_IPS:-}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY:-dev-token-key}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["gunicorn", "-c", "gunicorn.conf.py", "app.main:app"]

  worker:
    build: .
    container_name: dotmac_voice_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_voice}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
      FUSIONPBX_API_URL: ${FUSIONPBX_API_URL:-http://localhost:8080}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY:-}
      ESL_HOST: ${ESL_HOST:-localhost}
      ESL_PORT: ${ESL_PORT:-8021}
      ESL_PASSWORD: ${ESL_PASSWORD:-ClueCon}
      EDGE_WSS_URL: ${EDGE_WSS_URL:-wss://sip.dotmac.io:443}
      VOICE_INGRESS_API_KEYS: ${VOICE_INGRESS_API_KEYS:-}
      VOICE_INGRESS_ALLOWED_IPS: ${VOICE_INGRESS_ALLOWED_IPS:-}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY:-dev-token-key}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "worker", "-l", "info"]
    # Celery worker has no HTTP server; the image's HTTP healthcheck always
    # fails. Ping the worker via the broker instead.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -t 8 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 30s

  beat:
    build: .
    container_name: dotmac_voice_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/dotmac_voice}
      REDIS_URL: ${REDIS_URL:-redis://:redis@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis@redis:6379/1}
      FUSIONPBX_API_URL: ${FUSIONPBX_API_URL:-http://localhost:8080}
      FUSIONPBX_API_KEY: ${FUSIONPBX_API_KEY:-}
      ESL_HOST: ${ESL_HOST:-localhost}
      ESL_PORT: ${ESL_PORT:-8021}
      ESL_PASSWORD: ${ESL_PASSWORD:-ClueCon}
      EDGE_WSS_URL: ${EDGE_WSS_URL:-wss://sip.dotmac.io:443}
      VOICE_INGRESS_API_KEYS: ${VOICE_INGRESS_API_KEYS:-}
      VOICE_INGRESS_ALLOWED_IPS: ${VOICE_INGRESS_ALLOWED_IPS:-}
      TOKEN_SIGNING_KEY: ${TOKEN_SIGNING_KEY:-dev-token-key}
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "beat", "-l", "info"]
    # beat is a scheduler (not a worker; inspect-ping doesn't apply) and has no
    # HTTP server; disable the inherited image healthcheck and rely on restart.
    healthcheck:
      disable: true

  db:
    image: postgres:16
    container_name: dotmac_voice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dotmac_voice}
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - dotmac_voice_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: dotmac_voice_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  dotmac_voice_db_data:
