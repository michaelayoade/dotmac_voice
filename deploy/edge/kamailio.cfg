#!KAMAILIO
# dotmac_voice EDGE -- Kamailio as WebRTC registrar + router.
# wss://sip.dotmac.io -> nginx -> ws 127.0.0.1:8080. Kamailio registers WS clients
# (usrloc, in-memory) and routes WS<->WS calls directly, using rtpengine to relay
# DTLS-SRTP media (advertised on the public IP 160.119.126.62). FreeSWITCH
# (10.10.10.10) is reserved for PBX features and not in the basic WS<->WS path.
#
# AUTH: REGISTER + initial INVITE are digest-authenticated against the FusionPBX
# extension passwords via the read-only v_kam_subscriber view (sqlops + auth).
#
# === FS-in-path rollback toggle ===
# Uncomment the next line to route WS-originated calls through FreeSWITCH (PBX
# features). Commented = direct WS<->WS (known-good baseline). Toggle = edit +
# `kamailio -c` + `systemctl restart kamailio`, then verify with the harness.
# #!define ROUTE_VIA_FS

####### Global Parameters #########
debug=2
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4
auto_aliases=no
tcp_connection_lifetime=3604
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384

listen=tcp:127.0.0.1:8080
listen=udp:10.10.10.1:5060
listen=tcp:10.10.10.1:5060

####### Modules #########
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "sdpops.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "rtpengine.so"
loadmodule "nathelper.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "db_postgres.so"
loadmodule "sqlops.so"
loadmodule "auth.so"

modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)
modparam("usrloc", "db_mode", 0)
modparam("usrloc", "use_domain", 1)
modparam("usrloc", "handle_lost_tcp", 1)
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_contacts", 10)
modparam("registrar", "max_expires", 3600)
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")
modparam("nathelper", "received_avp", "$avp(RECEIVED)")
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
# Read-only connection to FusionPBX for digest-auth password lookups.
modparam("sqlops", "sqlcon", "ca=>postgres://kamailio_auth:2154b37427bdb715c27abd3d01e0a6d5@10.10.10.10:5432/fusionpbx")

####### Request Routing #########
request_route {
    if (!mf_process_maxfwd_header("10")) { sl_send_reply("483", "Too Many Hops"); exit; }
    if (!sanity_check("1511", "7")) { xlog("L_WARN", "malformed request from $si:$sp\n"); exit; }

    # WebSocket clients: force rport + encode the WS flow into the contact so we
    # can route inbound calls back over the same connection.
    if (proto == WS || proto == WSS) {
        force_rport();
        if (is_method("REGISTER")) {
            set_contact_alias();
        }
    }

    if (is_method("OPTIONS") && uri == myself) { sl_send_reply("200", "OK"); exit; }

    # in-dialog
    if (has_totag()) {
        if (loose_route()) {
            xlog("L_INFO", "[VOICE] in-dialog $rm ruri=$ru du=$du\n");
            if (is_method("BYE")) { rtpengine_delete(); }
            else if (is_method("INVITE") || is_method("UPDATE")) {
                route(RTPMANAGE);
                t_on_reply("MANAGE_REPLY");
            }
            handle_ruri_alias();
            route(RELAY);
            exit;
        }
        if (is_method("ACK")) { if (t_check_trans()) { route(RELAY); } exit; }
        sl_send_reply("404", "Not Here");
        exit;
    }

    if (is_method("CANCEL")) { if (t_check_trans()) { route(RELAY); } exit; }
    t_check_trans();

    # FS-originated leg (trusted peer 10.10.10.10) -> deliver to the WS user.
    # Loop guard: an FS leg is delivered to the user or fails cleanly; never sent back to FS.
    if ($si == "10.10.10.10" && is_method("INVITE")) {
        xlog("L_INFO", "[VOICE] FS-leg INVITE -> WS user $rU\n");
        if (!lookup("location")) { sl_send_reply("404", "User Offline"); exit; }
        handle_ruri_alias();
        record_route();
        route(RTPMANAGE);
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
        route(RELAY);
        exit;
    }

    # REGISTER -> authenticate against FusionPBX password, then save in location
    if (is_method("REGISTER")) {
        if (!route(AUTH_REGISTER)) { exit; }
        if (!save("location")) { sl_reply_error(); }
        xlog("L_INFO", "[VOICE] REGISTER saved aor=$tu from $si:$sp\n");
        exit;
    }

    # initial WS-originated INVITE -> authenticate the caller
    if (is_method("INVITE")) {
        if (!route(AUTH_INVITE)) { exit; }
#!ifdef ROUTE_VIA_FS
        # FS-in-path: hand the call to FreeSWITCH; its dialplan owns routing/features.
        xlog("L_INFO", "[VOICE] WS INVITE $fu -> FreeSWITCH (route-via-fs)\n");
        record_route();
        route(RTPMANAGE);                  # rtpengine: WebRTC (WS-A) -> plain RTP (FS)
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
        $du = "sip:10.10.10.10:5060";
        append_hf("X-Voice-Edge: kamailio\r\n");
        route(RELAY);
        exit;
#!else
        # Direct WS<->WS (known-good baseline): look up the callee + deliver over WS.
        xlog("L_INFO", "[VOICE] INVITE $fu -> $ru (direct)\n");
        if (!lookup("location")) {
            xlog("L_INFO", "[VOICE] callee $ru not registered\n");
            sl_send_reply("404", "User Not Found");
            exit;
        }
        handle_ruri_alias();
        record_route();
        route(RTPMANAGE);
        t_on_reply("MANAGE_REPLY");
        t_on_failure("MANAGE_FAILURE");
        route(RELAY);
        exit;
#!endif
    }

    # any other initial request to a registered user
    if (!lookup("location")) { sl_send_reply("404", "Not Found"); exit; }
    handle_ruri_alias();
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        xlog("L_WARN", "[VOICE] t_relay FAILED $rm ruri=$ru du=$du\n");
        sl_reply_error();
    }
    exit;
}

# Digest-auth a REGISTER against the FusionPBX extension password.
# Returns 1 on success; on failure sends a challenge/reject and returns -1.
route[AUTH_REGISTER] {
    if ($au == $null) { www_challenge("$td", "0"); return(-1); }
    if (!($au =~ "^[A-Za-z0-9._-]+$") || !($td =~ "^[A-Za-z0-9.-]+$")) {
        sl_send_reply("403", "Forbidden"); return(-1);
    }
    if (!sql_query("ca", "SELECT password FROM v_kam_subscriber WHERE username='$au' AND domain='$td'", "ra")) {
        sl_send_reply("500", "Auth backend error"); return(-1);
    }
    if ($dbr(ra=>rows) < 1) {
        sql_result_free("ra");
        xlog("L_INFO", "[VOICE] REGISTER auth: unknown user $au@$td\n");
        www_challenge("$td", "0"); return(-1);
    }
    if (!pv_www_authenticate("$td", "$dbr(ra=>[0,0])", "0")) {
        sql_result_free("ra");
        xlog("L_INFO", "[VOICE] REGISTER auth FAILED for $au@$td\n");
        www_challenge("$td", "0"); return(-1);
    }
    sql_result_free("ra");
    consume_credentials();
    return(1);
}

# Proxy-auth an initial INVITE against the caller's FusionPBX extension password.
route[AUTH_INVITE] {
    if ($au == $null) { proxy_challenge("$fd", "0"); return(-1); }
    if (!($au =~ "^[A-Za-z0-9._-]+$") || !($fd =~ "^[A-Za-z0-9.-]+$")) {
        sl_send_reply("403", "Forbidden"); return(-1);
    }
    if (!sql_query("ca", "SELECT password FROM v_kam_subscriber WHERE username='$au' AND domain='$fd'", "ra")) {
        sl_send_reply("500", "Auth backend error"); return(-1);
    }
    if ($dbr(ra=>rows) < 1) {
        sql_result_free("ra");
        proxy_challenge("$fd", "0"); return(-1);
    }
    if (!pv_proxy_authenticate("$fd", "$dbr(ra=>[0,0])", "0")) {
        sql_result_free("ra");
        xlog("L_INFO", "[VOICE] INVITE auth FAILED for $au@$fd\n");
        proxy_challenge("$fd", "0"); return(-1);
    }
    sql_result_free("ra");
    consume_credentials();
    return(1);
}

# WS<->WS WebRTC: both legs are DTLS-SRTP; rtpengine bridges + advertises public IP.
route[RTPMANAGE] {
    rtpengine_manage("replace-origin replace-session-connection ICE=force DTLS=active");
}

onreply_route[MANAGE_REPLY] {
    # Process the answer exactly ONCE -- re-running rtpengine_manage on
    # provisional/retransmitted replies resets the DTLS handshake (one-way audio).
    if (status =~ "[12][0-9][0-9]" && sdp_content() && $avp(rtp_answered) == $null) {
        $avp(rtp_answered) = 1;
        rtpengine_manage("replace-origin replace-session-connection ICE=force DTLS=active");
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) { exit; }
}

####### WebSocket handshake #########
event_route[xhttp:request] {
    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm == "GET") {
        if (ws_handle_handshake()) { exit; }
    }
    xhttp_reply("404", "Not Found", "", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket closed: $si:$sp\n");
}
